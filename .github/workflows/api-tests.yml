name: API Tests (Jest + Axios)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: API Tests – Jest + Axios
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Secrets are written to .env so dotenv picks them up at runtime in jest.config.ts
      - name: Create .env for CI
        run: |
          echo "API_BASE_URL=${{ secrets.API_BASE_URL || 'https://reqres.in/api' }}" >> .env
          echo "API_KEY=${{ secrets.API_KEY }}" >> .env

      - name: Verify secrets are available
        run: |
          if [ -z "${{ secrets.API_KEY }}" ]; then
            echo "::warning::API_KEY secret is empty – check repository Settings > Secrets"
          fi

      - name: Run API tests
        run: npm run test:api
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL || 'https://reqres.in/api' }}
          API_KEY: ${{ secrets.API_KEY }}

      - name: Upload Jest HTML report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: jest-api-report
          path: tests/api/reports/
          retention-days: 14
