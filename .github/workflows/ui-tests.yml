name: UI Tests (Playwright)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ui:
    name: UI Tests – Chromium (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Write UI_BASE_URL to .env so playwright.config.ts can pick it up via dotenv
      - name: Create .env for CI
        run: |
          echo "UI_BASE_URL=${{ secrets.UI_BASE_URL || 'https://www.saucedemo.com' }}" >> .env

      # Runs all specs including negative-testing – negative tests are expected
      # to fail and their failures will be visible in the uploaded report.
      - name: Run Playwright tests
        run: npm run test:ui
        env:
          CI: true

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: tests/ui/reports/
          retention-days: 14

      - name: Upload test results (traces, screenshots & videos)
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-test-results
          path: tests/ui/test-results/
          retention-days: 14
